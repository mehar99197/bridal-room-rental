services:

  # ─── Django Backend ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bridal-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - ./db.sqlite3:/app/db.sqlite3
    environment:
      - DEBUG=False
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - PYTHONUNBUFFERED=1
    command: ["./entrypoint.sh"]

  # ─── React Frontend (Nginx) ──────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.react
    container_name: bridal-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ─── Reverse Proxy (Nginx) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bridal-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/media:ro
      - static_data:/static:ro
    depends_on:
      - backend
      - frontend

volumes:
  media_data:
  static_data:
