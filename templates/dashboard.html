{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-speedometer2 me-2"></i>Dashboard</h2>

    <div class="row g-4 mb-4" id="stats-row"></div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">My Recent Bookings</h5>
            <a href="/bookings/" class="btn btn-sm btn-outline-primary">View All</a>
        </div>
        <div class="card-body" id="recent-bookings">
            <p class="text-muted mb-0">Loading...</p>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadDashboard() {
    if (!api.isAuthenticated()) {
        window.location.href = "/login/";
        return;
    }
    const [profileResp, bookingsResp, roomsResp, dressesResp] = await Promise.all([
        api.get("/auth/profile/"),
        api.get("/bookings/"),
        api.get("/rooms/"),
        api.get("/dresses/"),
    ]);

    let userName = "User";
    if (profileResp.ok) {
        const user = await profileResp.json();
        api.saveUser(user);
        userName = user.username || user.email;
        document.getElementById("user-email").textContent = user.email;
    }

    const statsRow = document.getElementById("stats-row");
    let totalRooms = 0, totalDresses = 0;
    if (roomsResp.ok) { const d = await roomsResp.json(); totalRooms = d.count ?? d.length ?? 0; }
    if (dressesResp.ok) { const d = await dressesResp.json(); totalDresses = d.count ?? d.length ?? 0; }

    statsRow.innerHTML = `
        <div class="col-md-4">
            <div class="card stat-card"><i class="bi bi-person-circle"></i><div class="stat-number">${userName}</div><p class="text-muted">Welcome back!</p></div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card"><i class="bi bi-house-heart"></i><div class="stat-number">${totalRooms}</div><p class="text-muted">Available Rooms</p></div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card"><i class="bi bi-handbag"></i><div class="stat-number">${totalDresses}</div><p class="text-muted">Available Dresses</p></div>
        </div>
    `;

    const recentDiv = document.getElementById("recent-bookings");
    if (!bookingsResp.ok) {
        recentDiv.innerHTML = '<p class="text-muted mb-0">Could not load bookings.</p>';
        return;
    }
    const bookingsData = await bookingsResp.json();
    const bookings = bookingsData.results || bookingsData || [];
    if (bookings.length === 0) {
        recentDiv.innerHTML = '<p class="text-muted mb-0">No bookings yet. <a href="/rooms/">Browse rooms</a> or <a href="/dresses/">dresses</a>.</p>';
        return;
    }
    const table = document.createElement("table");
    table.className = "table table-hover mb-0";
    table.innerHTML = `
        <thead><tr><th>Item</th><th>Dates</th><th>Status</th><th>Price</th></tr></thead>
        <tbody>${bookings.slice(0, 5).map(b => `
            <tr>
                <td>${b.room_name || b.dress_name || 'N/A'}</td>
                <td>${new Date(b.start_date).toLocaleDateString()} - ${new Date(b.end_date).toLocaleDateString()}</td>
                <td><span class="badge bg-${b.status === 'confirmed' ? 'success' : b.status === 'pending' ? 'warning' : b.status === 'cancelled' ? 'danger' : 'secondary'}">${b.status}</span></td>
                <td>$${b.total_price}</td>
            </tr>
        `).join('')}</tbody>
    `;
    recentDiv.innerHTML = '';
    recentDiv.appendChild(table);
}
loadDashboard();
</script>
{% endblock %}
