{% extends "base.html" %}
{% block title %}My Bookings{% endblock %}
{% block content %}
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-calendar-check me-2"></i>Bookings</h2>
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>All Booking Requests</span>
            <span class="text-muted small">Pending requests wait for admin approval</span>
        </div>
        <div class="card-body" id="booking-list"><p class="text-muted">Loading...</p></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadBookings() {
    if (!api.isAuthenticated()) { window.location.href = "/login/"; return; }
    const user = api.getUser();
    const isAdmin = user?.is_staff;
    const resp = await api.get("/bookings/");
    if (!resp.ok) { document.getElementById("booking-list").innerHTML = '<p class="text-danger">Failed to load.</p>'; return; }
    const data = await resp.json();
    const bookings = data.results || data || [];
    const container = document.getElementById("booking-list");
    if (bookings.length === 0) {
        container.innerHTML = '<p class="text-muted mb-0">No bookings yet. <a href="/rooms/">Browse rooms</a> or <a href="/dresses/">dresses</a>.</p>';
        return;
    }
    const statusColors = { pending: 'warning', confirmed: 'success', active: 'info', completed: 'secondary', cancelled: 'danger' };
    const statusLabels = { pending: 'Pending Approval', confirmed: 'Confirmed', active: 'Active', completed: 'Completed', cancelled: 'Rejected' };
    container.innerHTML = `<div class="table-responsive"><table class="table table-hover mb-0">
        <thead><tr>${isAdmin ? '<th>User</th>' : ''}<th>Item</th><th>Type</th><th>Dates</th><th>Status</th><th>Price</th><th>Actions</th></tr></thead>
        <tbody>${bookings.map(b => `
            <tr>
                ${isAdmin ? `<td>${b.user_email}</td>` : ''}
                <td>${b.room_name || b.dress_name || 'N/A'}</td>
                <td>${b.room ? '<i class="bi bi-house-heart"></i> Room' : '<i class="bi bi-handbag"></i> Dress'}</td>
                <td>${new Date(b.start_date).toLocaleDateString()} - ${new Date(b.end_date).toLocaleDateString()}</td>
                <td><span class="badge bg-${statusColors[b.status] || 'secondary'}">${statusLabels[b.status] || b.status}</span></td>
                <td>$${b.total_price}</td>
                <td>
                    ${['pending', 'confirmed'].includes(b.status) && !isAdmin ? `<button class="btn btn-sm btn-outline-danger cancel-btn" data-id="${b.id}">Cancel</button>` : '-'}
                    ${isAdmin && b.status === 'pending' ? `
                        <button class="btn btn-sm btn-success approve-btn" data-id="${b.id}"><i class="bi bi-check-lg"></i></button>
                        <button class="btn btn-sm btn-danger reject-btn" data-id="${b.id}"><i class="bi bi-x-lg"></i></button>
                    ` : ''}
                    ${isAdmin && b.status === 'pending' ? '' : isAdmin ? '-' : ''}
                </td>
            </tr>
        `).join('')}</tbody>
    </table></div>`;

    container.querySelectorAll(".cancel-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
            if (!confirm("Cancel this booking?")) return;
            const resp = await api.post(`/bookings/${btn.dataset.id}/cancel/`, {});
            if (resp.ok) { showAlert("Booking cancelled."); loadBookings(); }
            else showAlert("Failed to cancel.", "danger");
        });
    });

    container.querySelectorAll(".approve-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
            if (!confirm("Approve this booking?")) return;
            const resp = await api.post(`/bookings/${btn.dataset.id}/approve/`, {});
            if (resp.ok) { showAlert("Booking approved!"); loadBookings(); }
            else { const err = await resp.json(); showAlert(err.error || "Failed to approve.", "danger"); }
        });
    });

    container.querySelectorAll(".reject-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
            if (!confirm("Reject this booking?")) return;
            const resp = await api.post(`/bookings/${btn.dataset.id}/reject/`, {});
            if (resp.ok) { showAlert("Booking rejected."); loadBookings(); }
            else { const err = await resp.json(); showAlert(err.error || "Failed to reject.", "danger"); }
        });
    });
}
loadBookings();
</script>
{% endblock %}
