{% extends "base.html" %}
{% block title %}Bridal Dresses{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-handbag me-2"></i>Bridal Dresses</h2>
        <div class="d-flex gap-2">
            <select class="form-select form-select-sm d-inline-block w-auto" id="status-filter">
                <option value="">All Status</option>
                <option value="available">Available</option>
                <option value="rented">Rented</option>
                <option value="maintenance">Maintenance</option>
            </select>
            <select class="form-select form-select-sm d-inline-block w-auto" id="category-filter">
                <option value="">All Categories</option>
            </select>
        </div>
    </div>
    <div class="row g-4" id="dress-list"><p class="text-muted">Loading...</p></div>
    <nav class="mt-4"><ul class="pagination justify-content-center" id="pagination"></ul></nav>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1;
async function loadCategories() {
    const resp = await api.get("/categories/");
    if (!resp.ok) return;
    const data = await resp.json();
    const cats = data.results || data || [];
    const sel = document.getElementById("category-filter");
    cats.forEach(c => { sel.innerHTML += `<option value="${c.name}">${c.name}</option>`; });
}
async function loadDresses(page = 1) {
    const status = document.getElementById("status-filter").value;
    const category = document.getElementById("category-filter").value;
    let url = `/dresses/?page=${page}`;
    if (status) url += `&status=${status}`;
    if (category) url += `&category=${category}`;
    const resp = await api.get(url);
    if (!resp.ok) { document.getElementById("dress-list").innerHTML = '<p class="text-danger">Failed to load.</p>'; return; }
    const data = await resp.json();
    const results = data.results || [];
    const container = document.getElementById("dress-list");
    if (results.length === 0) {
        container.innerHTML = '<p class="text-muted">No dresses found.</p>';
        return;
    }
    container.innerHTML = results.map(d => `
        <div class="col-md-6 col-lg-4">
            <div class="card h-100 position-relative">
                <span class="badge bg-${d.status === 'available' ? 'success' : d.status === 'rented' ? 'warning' : 'secondary'} availability-badge">${d.status}</span>
                ${d.image ? `<img src="${d.image}" class="card-img-top" alt="${d.name}">` : '<div class="card-img-top bg-light d-flex align-items-center justify-content-center"><i class="bi bi-handbag display-3 text-muted"></i></div>'}
                <div class="card-body">
                    <h5 class="card-title">${d.name}</h5>
                    <p class="text-muted small mb-2"><i class="bi bi-tag me-1"></i>${d.category_name || 'Uncategorized'}</p>
                    <p class="text-muted small mb-2"><i class="bi bi-rulers me-1"></i>Size: ${d.size} &bull; ${d.color}</p>
                    <p class="price-tag mb-1">$${d.rental_price_per_day}<small class="text-muted fs-6">/day</small></p>
                    <p class="text-muted small">Deposit: $${d.deposit_amount}</p>
                    <a href="/dresses/${d.id}/" class="btn btn-primary w-100">View Details & Rent</a>
                </div>
            </div>
        </div>
    `).join('');

    const totalPages = Math.ceil((data.count || 1) / 20);
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = '';
    for (let i = 1; i <= Math.min(totalPages, 10); i++) {
        pagination.innerHTML += `<li class="page-item ${i === page ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
    }
    pagination.querySelectorAll('a').forEach(a => a.addEventListener('click', (e) => {
        e.preventDefault(); loadDresses(parseInt(e.target.dataset.page));
    }));
}

document.getElementById("status-filter").addEventListener("change", () => loadDresses(1));
document.getElementById("category-filter").addEventListener("change", () => loadDresses(1));
loadCategories();
loadDresses();
</script>
{% endblock %}
