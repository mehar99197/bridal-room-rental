{% extends "base.html" %}
{% block title %}Bridal Rooms{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-house-heart me-2"></i>Bridal Rooms</h2>
        <div>
            <select class="form-select form-select-sm d-inline-block w-auto" id="status-filter">
                <option value="">All Status</option>
                <option value="available">Available</option>
                <option value="booked">Booked</option>
                <option value="maintenance">Maintenance</option>
            </select>
        </div>
    </div>
    <div class="row g-4" id="room-list"><p class="text-muted">Loading...</p></div>
    <nav class="mt-4"><ul class="pagination justify-content-center" id="pagination"></ul></nav>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1;
async function loadRooms(page = 1) {
    const status = document.getElementById("status-filter").value;
    let url = `/rooms/?page=${page}`;
    if (status) url += `&status=${status}`;
    const resp = await api.get(url);
    if (!resp.ok) { document.getElementById("room-list").innerHTML = '<p class="text-danger">Failed to load.</p>'; return; }
    const data = await resp.json();
    const results = data.results || [];
    const container = document.getElementById("room-list");
    if (results.length === 0) {
        container.innerHTML = '<p class="text-muted">No rooms found.</p>';
        return;
    }
    container.innerHTML = results.map(room => `
        <div class="col-md-6 col-lg-4">
            <div class="card h-100 position-relative">
                <span class="badge bg-${room.status === 'available' ? 'success' : room.status === 'booked' ? 'warning' : 'secondary'} availability-badge">${room.status}</span>
                ${room.image ? `<img src="${room.image}" class="card-img-top" alt="${room.name}">` : '<div class="card-img-top bg-light d-flex align-items-center justify-content-center"><i class="bi bi-house-heart display-3 text-muted"></i></div>'}
                <div class="card-body">
                    <h5 class="card-title">${room.name}</h5>
                    <p class="text-muted small mb-2"><i class="bi bi-people me-1"></i>Capacity: ${room.capacity} guests</p>
                    <p class="text-muted small mb-2"><i class="bi bi-geo-alt me-1"></i>${room.location}</p>
                    <p class="card-text small">${(room.description || '').substring(0, 120)}...</p>
                    <p class="price-tag mb-3">$${room.price_per_hour}<small class="text-muted fs-6">/hour</small></p>
                    <a href="/rooms/${room.id}/" class="btn btn-primary w-100">View Details & Book</a>
                </div>
            </div>
        </div>
    `).join('');

    const totalPages = Math.ceil((data.count || 1) / 20);
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = '';
    for (let i = 1; i <= Math.min(totalPages, 10); i++) {
        pagination.innerHTML += `<li class="page-item ${i === page ? 'active' : ''}"><a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
    }
    pagination.querySelectorAll('a').forEach(a => a.addEventListener('click', (e) => {
        e.preventDefault(); loadRooms(parseInt(e.target.dataset.page));
    }));
}

document.getElementById("status-filter").addEventListener("change", () => loadRooms(1));
loadRooms();
</script>
{% endblock %}
