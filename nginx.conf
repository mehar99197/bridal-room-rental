upstream django {
    server backend:8000;
}

upstream react {
    server frontend:80;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Django media files (served directly from the shared volume)
    location /media/ {
        alias /media/;
        access_log off;
        expires 7d;
    }

    # Django static files — admin + built React assets (shared volume)
    location /static/ {
        alias /static/;
        access_log off;
        expires 30d;
    }

    # API requests → Django
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin panel → Django
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else → React frontend
    location / {
        proxy_pass http://react;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SPA fallback: serve index.html for non-file routes
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
